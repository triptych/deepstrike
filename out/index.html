<!DOCTYPE html>
<html lang="en" data-zone="surface">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0e0c0a">
  <title>DeepStrike</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/grid.css">

  <!-- Web component definitions — loaded early so connectedCallback
       fires during HTML parsing, before DOMContentLoaded boot(). -->
  <script src="js/components/ds-topbar.js"></script>
  <script src="js/components/ds-tray.js"></script>
  <script src="js/components/ds-screen-overworld.js"></script>
  <script src="js/components/ds-screen-grid.js"></script>
  <script src="js/components/ds-screen-items.js"></script>
  <script src="js/components/ds-screen-skills.js"></script>
  <script src="js/components/ds-screen-upgrade.js"></script>
  <script src="js/components/ds-screen-depot.js"></script>
  <script src="js/components/ds-screen-menu.js"></script>
</head>
<body>

<div id="app">

  <!-- ── Top Bar ─────────────────────────────────────────────── -->
  <ds-topbar></ds-topbar>

  <!-- ── Screen Viewport ─────────────────────────────────────── -->
  <main id="screens" role="main">
    <ds-screen-overworld></ds-screen-overworld>
    <ds-screen-grid></ds-screen-grid>
    <ds-screen-items></ds-screen-items>
    <ds-screen-skills></ds-screen-skills>
    <ds-screen-menu></ds-screen-menu>
    <ds-screen-upgrade></ds-screen-upgrade>
    <ds-screen-depot></ds-screen-depot>
  </main>

  <!-- ── Bottom Tray ─────────────────────────────────────────── -->
  <ds-tray></ds-tray>

</div><!-- /#app -->

<!-- Game modules — loaded after components so boot() can query
     the fully-rendered component DOM on DOMContentLoaded. -->
<script src="js/game.js"></script>
<script src="js/tools.js"></script>
<script src="js/grid.js"></script>
<script src="js/items.js"></script>
<script src="js/collection.js"></script>
<script src="js/ailments.js"></script>
<script src="js/skills.js"></script>
</body>
</html>
